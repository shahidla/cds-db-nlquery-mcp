name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test

# Deliberately NOT running `npm run test:deployment` here — it requires live
# database credentials and a deployed examples/capability-demo schema (HANA on
# BTP or similar). That's a required manual step before tagging a release (see
# README.md "How releases are tested"), not something CI can do without
# checking real secrets into this repo. CI here only covers what it safely can:
# the mocked unit suite, across the Node versions this package supports.
